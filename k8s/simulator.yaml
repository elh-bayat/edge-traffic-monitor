apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulator
  namespace: edge-traffic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simulator
  template:
    metadata:
      labels:
        app: simulator
    spec:
      containers:
      - name: simulator
        image: ghcr.io/elh-bayat/edge-traffic-monitor/simulator:latest
        env:
        - name: API_URL
          value: "http://api/api/v1/traffic"
