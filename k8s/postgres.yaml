apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: edge-traffic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16
        env:
        - name: POSTGRES_DB
          value: "trafficdb"
        - name: POSTGRES_USER
          value: "traffic"
        - name: POSTGRES_PASSWORD
          value: "traffic123"
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: edge-traffic
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
